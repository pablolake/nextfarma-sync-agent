# NextFarma Sync — Entorno de pruebas E2E
#
# Uso:
#   docker compose up -d
#   (esperar ~40s a que aparezca "DB inicializada" en los logs)
#   docker compose logs db-init
#
# Para ejecutar el sync engine contra esta BD:
#   (desde la raíz del proyecto, con API_KEY y TENANT_ID reales)
#   DB_SERVER=localhost DB_PORT=1433 DB_NAME=Farmatic DB_CONSEJO=Consejo \
#   DB_USER=sa DB_PASSWORD='NextFarma2026!' DB_ENCRYPT=false DB_TRUST_CERT=true \
#   API_KEY=<tu_key> TENANT_ID=<tu_tenant> node src/sync.js
#
# O con el archivo test.env:
#   node -r dotenv/config src/sync.js dotenv_config_path=docker/test.env

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "NextFarma2026!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    healthcheck:
      test: >
        /opt/mssql-tools18/bin/sqlcmd
        -S localhost -U SA -P "NextFarma2026!"
        -Q "SELECT 1" -C -b
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - sqldata:/var/opt/mssql

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      SA_PASSWORD: "NextFarma2026!"
    volumes:
      - ./farmatic-test.sql:/farmatic-test.sql:ro
      - ./init-db.sh:/init-db.sh:ro
    entrypoint: ["bash", "/init-db.sh"]
    restart: "no"

volumes:
  sqldata:
